<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Campus Booking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Sora', sans-serif; }
    body { background: #f4f6f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .register-box {
      background: #fff; border-radius: 16px;
      padding: 2.25rem; width: 100%; max-width: 520px;
      box-shadow: 0 8px 40px rgba(0,0,0,.08);
    }
    .register-box h2 { color: #1a3a5c; font-weight: 700; font-size: 1.25rem; }
    .register-box p.sub { color: #94a3b8; font-size: .83rem; margin-bottom: 1.5rem; }
    .form-label { font-size: .82rem; font-weight: 600; color: #475569; margin-bottom: .3rem; }
    .form-control {
      border: 1.5px solid #e2e8f0; border-radius: 8px;
      padding: .6rem .9rem; font-size: .87rem;
    }
    .form-control:focus { border-color: #1a3a5c; box-shadow: 0 0 0 3px rgba(26,58,92,.08); }
    .btn-register {
      background: #1a3a5c; color: #fff; border: none;
      border-radius: 8px; padding: .7rem; font-weight: 700;
      font-size: .9rem; width: 100%;
    }
    .btn-register:hover { background: #2563a8; color: #fff; }
  </style>
</head>
<body>
<div class="register-box">
  <div class="mb-3" style="font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:#e8a020;font-weight:700">Dev Squad · Group 40</div>
  <h2>Create Account</h2>
  <p class="sub">Register to book campus facilities</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2 px-3 mb-3" style="font-size:.83rem;border-radius:8px">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST" action="{{ url_for('auth.register') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="row g-3 mb-3">
      <div class="col-6">
        <label class="form-label">First Name</label>
        <input type="text" name="name" class="form-control" placeholder="John" required>
      </div>
      <div class="col-6">
        <label class="form-label">Surname</label>
        <input type="text" name="surname" class="form-control" placeholder="Doe" required>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Student Number</label>
      <input type="text" name="student_number" class="form-control"
             placeholder="e.g. 22012345" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Email Address</label>
      <input type="email" name="email" class="form-control"
             placeholder="you@email.com" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Role</label>
      <select name="role" class="form-control">
        <option value="student">Student</option>
        <option value="staff">Staff</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control"
             placeholder="Min. 8 characters" required>
    </div>

    <div class="mb-4">
      <label class="form-label">Confirm Password</label>
      <input type="password" name="confirm_password" class="form-control"
             placeholder="Re-enter password" required>
    </div>

    <button type="submit" class="btn-register">Create Account</button>
  </form>

  <div class="text-center mt-3" style="font-size:.82rem;color:#94a3b8">
    Already have an account?
    <a href="{{ url_for('auth.login') }}" style="color:#1a3a5c;font-weight:600">Sign in</a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
